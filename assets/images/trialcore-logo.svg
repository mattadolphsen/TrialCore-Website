<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="514" viewBox="10 0 2190 514" role="img" aria-labelledby="title desc">
  <title id="title">TrialCore Logo</title>
  <desc id="desc">TrialCore logo with nested hexagons, centered crosshair, ECG line, and wordmark.</desc>

  <defs>
    <style>
      .blue { fill: #3d5776; stroke: #3d5776; }
      .gray { fill: #545454; }
      .white { fill: #ffffff; stroke: #ffffff; }

      .wordmark {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 400;
      }
    </style>
  </defs>

  <!-- Outer hexagon outline -->
  <path d="M 409 216 L 409 151 L 214 37 L 18 151 L 18 379 L 214 492 L 409 379 L 409 263"
        fill="none"
        stroke="#3d5776"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="miter"/>

  <!-- Inner filled hexagon -->
  <polygon points="214,92 363,178 363,350 214,437 65,350 65,178"
           fill="#3d5776"/>

  <!-- Crosshair -->
  <line x1="214" y1="140" x2="214" y2="386"
        stroke="#ffffff"
        stroke-width="7"
        stroke-linecap="round"/>

  <line x1="122" y1="263" x2="306" y2="263"
        stroke="#ffffff"
        stroke-width="7"
        stroke-linecap="round"/>

  <circle cx="214" cy="140" r="9" fill="#ffffff"/>
  <circle cx="214" cy="386" r="9" fill="#ffffff"/>
  <circle cx="122" cy="263" r="9" fill="#ffffff"/>
  <circle cx="306" cy="263" r="9" fill="#ffffff"/>

  <!-- ECG line -->
  <path d="M 409 263 H 482 L 513 207 L 545 293 L 588 221 L 613 263 H 728"
        fill="none"
        stroke="#3d5776"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="704"
        y="390"
        class="wordmark"
        font-size="340"
        text-rendering="geometricPrecision"
        fill="#3d5776">Trial</text>

  <text x="1310"
        y="390"
        class="wordmark"
        font-size="340"
        text-rendering="geometricPrecision"
        fill="#545454">Core</text>

</svg>
